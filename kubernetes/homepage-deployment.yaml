apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      containers:
        - name: homepage
          image: "ghcr.io/gethomepage/homepage:latest"
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "localhost:5000,$(MY_POD_IP):4000,$(MY_POD_IP):3000" # See gethomepage.dev/installation/#homepage_allowed_hosts . Value before the comma is required for the k8s probe
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          volumeMounts:
            - mountPath: /app/config/proxmox.yaml
              name: homepage-config-proxmox
              subPath: proxmox.yaml
            - mountPath: /app/config/custom.css
              name: homepage-config-js-css
              subPath: custom.css
            - mountPath: /app/config/custom.js
              name: homepage-config-js-css
              subPath: custom.js
            - mountPath: /app/config/bookmarks.yaml
              name: homepage-config-bookmarks
              subPath: bookmarks.yaml
            - mountPath: /app/config/docker.yaml
              name: homepage-config-docker
              subPath: docker.yaml
            - mountPath: /app/config/kubernetes.yaml
              name: homepage-config-kubernetes
              subPath: kubernetes.yaml
            - mountPath: /app/config/services.yaml
              name: homepage-config-services
              subPath: services.yaml
            - mountPath: /app/config/settings.yaml
              name: homepage-config-settings
              subPath: settings.yaml
            - mountPath: /app/config/widgets.yaml
              name: homepage-config-widgets
              subPath: widgets.yaml
            - mountPath: /app/config/logs
              name: logs
            - mountPath: /app/public/images
              name: images
        - name: log-shipper
          image: fluent/fluent-bit:latest
          securityContext:
            runAsUser: 0
          args:
            - /fluent-bit/bin/fluent-bit
            - -i
            - tail
            - -p
            - path=/var/log/pods/default_homepage-*/*/*.log
            - -o
            - opentelemetry
            - -p
            - host=otel-collector.observability.svc.cluster.local
            - -p
            - port=4318
          volumeMounts:
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
      volumes:
      - configMap:
          name: homepage-docker
        name: homepage-config-docker
      - configMap:
          name: homepage-kubernetes
        name: homepage-config-kubernetes
      - configMap:
          name: homepage-services
        name: homepage-config-services
      - configMap:
          name: homepage-settings
        name: homepage-config-settings
      - configMap:
          name: homepage-widgets
        name: homepage-config-widgets
      - configMap:
          name: homepage-bookmarks
        name: homepage-config-bookmarks
      - configMap:
          name: homepage-js-css
        name: homepage-config-js-css
      - configMap:
          name: homepage-proxmox
        name: homepage-config-proxmox
      - emptyDir: {}
        name: logs
      - persistentVolumeClaim:
          claimName: homepage-images-pvc
        name: images
      - name: varlogpods
        hostPath:
          path: /var/log/pods
