apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-settings
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
data:
  settings.yaml: |
    title: Bonjour, je
    description: suis une homepage
    background:
      image: /images/DSCF1131.jpg
      blur: sm # sm, "", md, xl... see https://tailwindcss.com/docs/backdrop-blur
      opacity: 80 # 0-100
    favicon: /images/eye_universe.png
    providers:
      openweathermap: openweathermapapikey
      weatherapi: weatherapiapikey

