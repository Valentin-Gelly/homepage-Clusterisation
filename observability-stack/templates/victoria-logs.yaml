apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-logs
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoria-logs
  template:
    metadata:
      labels:
        app: victoria-logs
    spec:
      containers:
        - name: victoria-logs
          image: {{ .Values.victoria.logs.image | quote }}
          args:
            - -storageDataPath=/vlogs
            - -httpListenAddr=:9428
          ports:
            - name: http
              containerPort: 9428
---
apiVersion: v1
kind: Service
metadata:
  name: victoria-logs
  namespace: observability
spec:
  selector:
    app: victoria-logs
  ports:
    - name: http
      port: 9428
      targetPort: 9428
      protocol: TCP
