apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-traces
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoria-traces
  template:
    metadata:
      labels:
        app: victoria-traces
    spec:
      containers:
        - name: victoria-traces
          image: {{ .Values.victoria.traces.image | quote }}
          args:
            - -storageDataPath=/vtraces
            - -httpListenAddr=:8429
            - -otlpGRPCListenAddr=:4317
            - -otlpGRPC.tls=false
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: http
              containerPort: 8429
          readinessProbe:
            httpGet:
              path: /health
              port: 8429
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: victoria-traces-data
              mountPath: /vtraces
      volumes:
        - name: victoria-traces-data
          {{- if .Values.victoria.traces.persistence.enabled }}
          persistentVolumeClaim:
            claimName: victoria-traces-data
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: victoria-traces
  namespace: observability
spec:
  selector:
    app: victoria-traces
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: http
      port: 8429
      targetPort: 8429
      protocol: TCP
