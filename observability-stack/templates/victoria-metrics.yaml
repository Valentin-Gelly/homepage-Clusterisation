apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-metrics
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoria-metrics
  template:
    metadata:
      labels:
        app: victoria-metrics
    spec:
      containers:
        - name: victoria-metrics
          image: {{ .Values.victoria.metrics.image }}
          args:
            - -storageDataPath=/vm-data
            - -httpListenAddr=:8428
            - -retentionPeriod=7d
          ports:
            - name: http
              containerPort: 8428
          readinessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: victoria-metrics-data
              mountPath: /vm-data
      volumes:
        - name: victoria-metrics-data
          {{- if .Values.victoria.metrics.persistence.enabled }}
          persistentVolumeClaim:
            claimName: victoria-metrics-data
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: victoria-metrics
  namespace: observability
spec:
  selector:
    app: victoria-metrics
  ports:
    - name: http
      port: 8428
      targetPort: 8428
      protocol: TCP
