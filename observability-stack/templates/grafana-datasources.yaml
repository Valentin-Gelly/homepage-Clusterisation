apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        url: http://victoria-metrics:8428

      - name: VictoriaLogs
        type: loki
        url: http://victoria-logs:9428

      - name: Tempo
        type: tempo
        url: http://tempo:3100