apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        access: proxy
        url: http://victoria-metrics.observability.svc.cluster.local:8428
        isDefault: true
      - name: VictoriaLogs
        type: victoriametrics-logs-datasource
        access: proxy
        url: http://victoria-logs.observability.svc.cluster.local:9428
      - name: VictoriaTraces
        type: tempo
        access: proxy
        url: http://tempo.observability.svc.cluster.local:8429
