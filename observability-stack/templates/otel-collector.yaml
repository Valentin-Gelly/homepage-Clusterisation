apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      prometheus:
        config:
          scrape_configs:
            - job_name: victoria-metrics
              scrape_interval: 15s
              static_configs:
                - targets: ['victoria-metrics:8428']
            - job_name: victoria-logs
              scrape_interval: 15s
              static_configs:
                - targets: ['victoria-logs:9428']
            - job_name: victoria-traces
              scrape_interval: 15s
              static_configs:
                - targets: ['victoria-traces:8429']
            - job_name: otel-collector
              scrape_interval: 15s
              static_configs:
                - targets: ['localhost:8888']

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1000

    exporters:
      prometheusremotewrite:
        endpoint: "http://victoria-metrics:8428/api/v1/write"
        tls:
          insecure: true

      otlphttp/vlogs:
        endpoint: "http://victoria-logs:9428/insert/opentelemetry"  # ← corrigé
        tls:
          insecure: true

      otlphttp/vtraces:
        endpoint: "http://victoria-traces:8429/insert/opentelemetry"  # ← path HTTP
        tls:
          insecure: true

    service:
      telemetry:
        metrics:
          address: 0.0.0.0:8888
      pipelines:
        metrics:
          receivers: [otlp, prometheus]
          processors: [batch]
          exporters: [prometheusremotewrite]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp/vlogs]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp/vtraces]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: {{ .Values.otelCollector.image }}
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: metrics
              containerPort: 8888
          volumeMounts:
            - name: config
              mountPath: /etc/otel/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: metrics
      port: 8888
      targetPort: 8888
      protocol: TCP
