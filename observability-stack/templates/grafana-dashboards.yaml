apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provisioning
  namespace: observability
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: true
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-homepage-traces
  namespace: observability
data:
  homepage-logs.json: |
    {{ .Files.Get "dashboards/homepage-logs.json" | nindent 4 }}
  homepage-metrics.json: |
    {{ .Files.Get "dashboards/homepage-metrics.json" | nindent 4 }}
