  {{- if hasKey .Values.victoria.logs.persistence "storageClass" }}
  storageClassName: {{ .Values.victoria.logs.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
---
{{- if .Values.victoria.traces.persistence.enabled }}
