{{- if .Values.victoria.metrics.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: victoria-metrics-data
  namespace: observability
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.victoria.metrics.persistence.size | quote }}
  {{- if hasKey .Values.victoria.metrics.persistence "storageClass" }}
  storageClassName: {{ .Values.victoria.metrics.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
---
{{- if .Values.victoria.logs.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
